name: lezzet_pusulasi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  google_generative_ai: ^0.4.7
  flutter_markdown: ^0.7.7+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  speech_to_text: ^7.3.0
  share_plus: ^12.0.1

  # Firebase paketleri
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  image_picker: ^1.2.1
  firebase_storage: ^12.4.10
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png